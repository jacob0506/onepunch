<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Punch Assets Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .img-card:hover .img-tip { opacity: 1; }
        .img-tip { opacity: 0; transition: opacity 0.2s; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <header class="p-6 bg-gray-800 shadow-xl sticky top-0 z-10 flex justify-between items-center">
        <h1 class="text-2xl font-bold">璧勬簮娴忚鍣?/h1>
        <div id="stats" class="text-gray-400 text-sm">姝ｅ湪鍔犺浇...</div>
    </header>

    <main class="p-6">
        <div id="filters" class="mb-8 flex flex-wrap gap-2">
            <!-- 鏂囦欢澶硅繃婊ゅ櫒灏嗗湪杩欓噷鐢熸垚 -->
        </div>

        <div id="gallery" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-4">
            <!-- 鍥剧墖灏嗗湪杩欓噷鍔犺浇 -->
        </div>
    </main>

    <!-- 鍥剧墖璇︽儏寮圭獥 -->
    <div id="modal" class="fixed inset-0 bg-black/90 hidden z-50 flex items-center justify-center p-4 cursor-zoom-out">
        <img id="modal-img" class="max-w-full max-h-full object-contain shadow-2xl" src="" alt="">
    </div>

    <script>
        let allAssets = [];
        const gallery = document.getElementById('gallery');
        const filters = document.getElementById('filters');
        const stats = document.getElementById('stats');
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modal-img');

        async function init() {
            try {
                const res = await fetch('assets.json');
                allAssets = await res.json();
                renderFilters();
                renderGallery();
                stats.innerText = `鍏?${allAssets.length} 涓祫婧恅;
            } catch (e) {
                console.error(e);
                stats.innerText = '鍔犺浇澶辫触锛岃纭 assets.json 瀛樺湪';
            }
        }

        function renderFilters() {
            const folders = [...new Set(allAssets.map(a => a.folder))].sort();
            filters.innerHTML = '<button id="btn-all" onclick="filterBy(null)" class="px-3 py-1 bg-blue-600 rounded-full text-sm hover:bg-blue-500 transition">鍏ㄩ儴</button>';
            folders.forEach(f => {
                const btn = document.createElement('button');
                btn.className = 'px-3 py-1 bg-gray-700 rounded-full text-sm hover:bg-gray-600 transition';
                btn.innerText = f;
                btn.onclick = () => filterBy(f, btn);
                filters.appendChild(btn);
            });
        }

        function filterBy(folder, btn) {
            // 鏇存柊鎸夐挳鏍峰紡
            document.querySelectorAll('#filters button').forEach(b => b.classList.replace('bg-blue-600', 'bg-gray-700'));
            if(btn) btn.classList.replace('bg-gray-700', 'bg-blue-600');
            else document.getElementById('btn-all').classList.replace('bg-gray-700', 'bg-blue-600');

            const filtered = folder ? allAssets.filter(a => a.folder === folder) : allAssets;
            renderGallery(filtered);
        }

        function renderGallery(assets = allAssets) {
            gallery.innerHTML = '';
            assets.forEach(asset => {
                const div = document.createElement('div');
                div.className = 'img-card relative bg-gray-800 rounded-lg overflow-hidden border border-gray-700 aspect-square flex items-center justify-center cursor-pointer hover:scale-105 transition shadow-lg';
                div.innerHTML = `
                    <img class="max-w-full max-h-full object-contain lazy" data-src="${asset.path}" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
                    <div class="img-tip absolute bottom-0 left-0 right-0 bg-black/60 p-2 text-[10px] truncate text-center">
                        ${asset.name}
                    </div>
                `;
                div.onclick = () => {
                    modalImg.src = asset.path;
                    modal.classList.remove('hidden');
                };
                gallery.appendChild(div);
            });
            initLazyLoading();
        }

        function initLazyLoading() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const img = entry.target;
                        img.src = img.dataset.src;
                        observer.unobserve(img);
                    }
                });
            });
            document.querySelectorAll('.lazy').forEach(img => observer.observe(img));
        }

        modal.onclick = () => modal.classList.add('hidden');

        init();
    </script>
</body>
</html>
